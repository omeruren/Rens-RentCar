<app-blank
  [pageTitle]="pageTitle()"
  pageIcon="bi-zoom-in"
  [showStatusCheckbox]="false"
  [showStatus]="true"
  [status]="data().isActive"
  [showAudit]="true"
  [audit]="data()"
  [loading]="loading()"
  size="col-md-6">
    <div class="admin-card">
        <div class="card-header">
            <h6><i class="bi bi-info-circle text-primary me-2"></i>Basic Informations</h6>
        </div>
        <div class="card-body">
            <div class="detail-grid">
                <div class="detail-item">
                    <label class="detail-label">Package Name</label>
                    <span class="detail-value">
                        {{data().name}}
                    </span>
                </div>
                <div class="detail-item">
                    <label class="detail-label">Price</label>
                    <span class="detail-value">
                        {{data().price}}
                    </span>
                </div>
                <div class="detail-item">
                    <label class="detail-label">Recommended</label>
                    <span class="detail-value">
                        <span *ngIf="data().isRecommended" class="badge bg-success">Yes</span>
                        <span *ngIf="!data().isRecommended" class="badge bg-secondary">No</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-card">
        <div class="card-header">
            <h6><i class="bi bi-shield-check text-primary me-2"></i>Coverages</h6>
        </div>
        <div class="card-body">
            <div class="detail-grid">
                <div class="detail-item">
                    <label class="detail-label">Coverages</label>
                    <span class="detail-value">
                        <span *ngFor="let coverage of data().coverages" class="badge bg-info me-2">
                            {{coverage}}
                        </span>
                    </span>
                </div>
            </div>
        </div>
    </div>
</app-blank>
