
 <app-grid
 pageTitle="Branches"
 endpoint="rent/odata/branches"
 endpointEntityName="branches"
 permissionEntityName="branch"
 [addOptions]="{url: '/branches/add', permission: 'branch:create' }"
 [editOptions]="{url: '/branches/edit', permission: 'branch:edit'}"
 [detailOptions]="{url: '/branches/details', permission: 'branch:view'}"
 [deleteOptions]="{url: '/rent/branches', permission: 'branch:delete'}"
 [breadcrumbs]="breadcrumbs()"
 captionTitle="Branch List"
>
    <ng-template flexiGridCaptionCommandTemplate>
    </ng-template>
    <flexi-grid-column field="name" title="Branch Name" />
    <flexi-grid-column field="city" title="City" />
    <flexi-grid-column field="district" title="District" />
    <flexi-grid-column field="fullAddress" title="Full Address" />
    <flexi-grid-column field="phoneNumber1" title="Primary Phone umber">
      <ng-template flexiGridCellTemplate let-item>
        <span>+90 {{item.phoneNumber1 |mask:'(999) 999 99 99'}} </span>
      </ng-template>
    </flexi-grid-column>
    <flexi-grid-column field="phoneNumber2" title="Second Phone number">
      <ng-template flexiGridCellTemplate let-item>
        @if (item.phoneNumber2!==null) {

        <span>+90 {{item.phoneNumber2 |mask:'(999) 999 99 99'}} </span>
        }@else {
        <span style="font-style: italic; font-weight: bold"
          >No Second Phone</span
        >
        }
      </ng-template>
    </flexi-grid-column>
  </app-grid>
