<app-grid
  pageTitle="Reservations"
  endpointEntityName="reservations"
  permissionEntityName="reservation"
  endpoint="rent/odata/reservations"
  [breadcrumbs]="breadcrumbs()"
  captionTitle="Reservation List"
>
  <flexi-grid-column field="pickUp.name" title="Pickup Location" />
  <flexi-grid-column field="pickUpDate" title="Pickup Date" />
  <flexi-grid-column field="pickUpTime" title="Pickup Time" />
  <flexi-grid-column field="deliveryDate" title="Delivery Date" />
  <flexi-grid-column field="deliveryTime" title="Delivery Time" />
  <flexi-grid-column field="customer.fullName" title="Customer" />
  <flexi-grid-column field="customer.phoneNumber" title="Phone" />
  <flexi-grid-column title="Vehicle Image">
    <ng-template flexiGridCellTemplate let-item>
      <img
        [src]="`https://localhost:7203/images/${item.imageUrl}`"
        alt="Vehicle"
        class="vehicle-image"
      />
    </ng-template>
  </flexi-grid-column>
  <flexi-grid-column field="vehicle.brand" title="Brand" />
  <flexi-grid-column field="vehicle.model" title="Model" />
  <flexi-grid-column field="vehicle.modelYear" title="Model Year" />
  <flexi-grid-column field="vehicle.color" title="Color" />
  <flexi-grid-column field="vehicle.categoryName" title="Category" />
  <flexi-grid-column field="totalDay" title="Day" />
  <flexi-grid-column
    field="total"
    title="Total Amount"
    filterType="number"
    format="c"
    symbol="₺"
    textAlign="right"
  />
  <flexi-grid-column field="status" title="Status" />
</app-grid>
