<app-blank
  [pageTitle]="pageTitle()"
  pageIcon="bi-zoom-in"
  [showStatusCheckbox]="false"
  [showStatus]="true"
  [status]="data().isActive"
  [showAudit]="true"
  [audit]="data()"
  [loading]="loading()"
  size="col-md-6"
>
  <div class="admin-card">
    <div class="card-header">
      <h6>
        <i class="bi bi-info-circle text-primary me-2"></i>User Informations
      </h6>
    </div>
    <div class="card-body">
      <div class="detail-grid">
        <div class="detail-item">
          <label class="detail-label">First Name</label>
          <span class="detail-value"> {{data().firstName}} </span>
        </div>
        <div class="detail-item">
          <label class="detail-label">Last Name</label>
          <span class="detail-value"> {{data().lastName}} </span>
        </div>
        <div class="detail-item">
          <label class="detail-label">User Name</label>
          <span class="detail-value"> {{data().userName}} </span>
        </div>
        <div class="detail-item">
          <label class="detail-label">Email</label>
          <span class="detail-value"> {{data().email}} </span>
        </div>
      </div>
    </div>
  </div>
  <div class="admin-card">
    <div class="card-header">
      <h6><i class="bi bi-key text-primary me-2"></i>Other Details</h6>
    </div>
    <div class="card-body">
      <div class="detail-grid">
        <div class="detail-item">
          <label class="detail-label">Branch</label>
          <span class="detail-value"> {{data().branchName}} </span>
        </div>
        <div class="detail-item">
          <label class="detail-label">Role</label>
          <span class="detail-value"> {{data().roleName}} </span>
        </div>
      </div>
    </div>
  </div>
</app-blank>
