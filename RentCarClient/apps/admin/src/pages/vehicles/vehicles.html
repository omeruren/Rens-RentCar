<app-grid
  pageTitle="Vehicles"
  endpointEntityName="vehicles"
  permissionEntityName="vehicle"
  [breadcrumbs]="breadcrumbs()"
  captionTitle="Vehicle List"
>
  <flexi-grid-column title="Vehicle Photo">
    <ng-template flexiGridCellTemplate let-item>
      <img
        [src]="`https://localhost:7203/images/${item.imageUrl}`"
        alt="Vehicle"
        style="
          width: 150px;
          height: 90px;
          object-fit: cover;
          margin-right: 8px;
          border-radius: 4px;
        "
      />
      {{item.brand}}
    </ng-template>
  </flexi-grid-column>
  <flexi-grid-column field="brand" title="Brand" />
  <flexi-grid-column field="model" title="Model" />
  <flexi-grid-column field="modelYear" title="Model Year" />
  <flexi-grid-column field="color" title="Color" />
  <flexi-grid-column field="plate" title="Plate" />
  <flexi-grid-column field="categoryName" title="Category" />
  <flexi-grid-column field="branchName" title="Branch " />
  <flexi-grid-column field="vinNumber" title="VIN No" />
  <flexi-grid-column field="engineNumber" title="Engine No" />
  <flexi-grid-column field="description" title="Description" />
  <flexi-grid-column field="fuelType" title="Fuel Type" />
  <flexi-grid-column field="transmission" title="Transmission" />
  <flexi-grid-column field="engineVolume" title="Engine Volume" />
  <flexi-grid-column field="enginePower" title="Engine Power" />
  <flexi-grid-column field="tractionType" title="Traction Type" />
  <flexi-grid-column field="fuelConsumption" title="Fuel Consumption" />
  <flexi-grid-column field="seatCount" title="Seat Count" />
  <flexi-grid-column field="kilometer" title="Kilometer" />
  <flexi-grid-column field="dailyPrice" title="Daily Price" />
  <flexi-grid-column field="weeklyDiscountRate" title="Weekly Disc." />
  <flexi-grid-column field="monthlyDiscountRate" title="Monthly Disc." />
  <flexi-grid-column field="insuranceType" title="Insurance Type" />
  <flexi-grid-column field="lastMaintenanceDate" title="Last Maintenance Date" />
  <flexi-grid-column field="lastMaintenanceKm" title="Last Maintenance Km" />
  <flexi-grid-column field="nextMaintenanceKm" title="Next Maintenance Km" />
  <flexi-grid-column field="inspectionDate" title="Inspection Date" />
  <flexi-grid-column field="insuranceEndDate" title="Insurance End Date" />
  <flexi-grid-column field="cascoEndDate" title="Casco End Date" />
  <flexi-grid-column field="tireStatus" title="Tire Status" />
  <flexi-grid-column field="generalStatus" title="General Status" />
  <flexi-grid-column field="features" title="Features" />
</app-grid>
