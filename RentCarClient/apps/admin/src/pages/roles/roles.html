<app-grid
  pageTitle="Roles"
  endpointEntityName="roles"
  [breadcrumbs]="breadcrumbs()"
>
  <flexi-grid-column field="name" title="Role name" />
  <flexi-grid-column field="permissionCount" title="Permissions"  textAlign="center" />
  <ng-template #columnCommandTemplate let-item>
    <flexi-button
    btnSize="x-small"
      btnColor="black"
      btnIcon="key"
      title="Permissions"
      [routerLink]="['/roles/permissions',item.id]"
    />
  </ng-template>
</app-grid>
