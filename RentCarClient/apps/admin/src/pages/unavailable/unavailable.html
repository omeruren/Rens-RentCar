<div class="unavailable-wrapper">
  <div class="blob gear-blob"></div>
  <div class="glass-card">
    <div class="icon-container pulse-glow">
      <i class="bi bi-tools"></i>
    </div>
    <h1 class="gradient-text-blue">503</h1>
    <h2 class="sub-title">Service Unavailable</h2>
    <p class="desc-text">
      We are currently undergoing scheduled maintenance to improve your
      experience. Our systems will be back online shortly.
    </p>

    <div class="status-box">
      <div class="status-indicator"></div>
      <span>System currently offline</span>
    </div>

    <div class="action-buttons">
      <button
        class="btn-outline flex-center"
        onclick="goBack()"
      >
        <i class="bi bi-arrow-clockwise"></i>
        <span>Go Back</span>
      </button>
      <a routerLink="/" class="btn-premium flex-center">
        <i class="bi bi-house-door"></i>
        <span>Return to Home</span>
      </a>
    </div>
  </div>
</div>
